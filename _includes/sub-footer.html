<!-- Three.js - lazy loaded via IntersectionObserver when .webgl-fitthumbs becomes visible -->
<script>
  (function() {
    var grid = document.querySelector('.webgl-fitthumbs');
    if (!grid || typeof THREE !== 'undefined') return;
    var observer = new IntersectionObserver(function(entries) {
      if (entries[0].isIntersecting) {
        observer.disconnect();
        var s = document.createElement('script');
        s.src = '/assets/ajax/libs/three.js/r128/three.min.js';
        document.head.appendChild(s);
      }
    }, { rootMargin: '300px' });
    observer.observe(grid);
  })();
</script>
