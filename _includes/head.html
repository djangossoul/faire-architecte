	i.arrow-icon {
		border: solid #000;
		border-width: 0px 3px 3px 0px;
		box-sizing:border-box;
		display: block;
		position:relative;
		top:0px;
		left:0px;
		height:20px;
		width:20px;

	i.arrow-icon::after {
		content: "";
		position: absolute;
		width: 28px;
		height: 3px;
		top: 7px;
		left: -6px;
		background-color: currentColor;
		transform: rotate(45deg);
		-webkit-transform: rotate(45deg);
	}
	
	.light-content i.arrow-icon:after, .light-content .change-header i.arrow-icon::after, .dark-content .item i.arrow-icon::after {

		width:auto;
		height:20px;
		position: absolute;

	.hero-arrow {

		right: 0;
		margin: 0 auto;
		cursor:pointer;

		position:relative;

		opacity:0;
		transform: translateY(50%);
		-webkit-transform: translateY(50%);
	}
	
	@keyframes occasional-arrow-bounce {
		0% { transform: translateY(3px); }
	  100% { transform: translateY(-3px); }
	}

		font: var(--fa-font-solid);

		text-align:center;
		color:#fff;

		width:20px;
		height:20px;
		position: absolute;
		top: 50%;
		margin-top: -14px;
		left: 50%;

		animation: occasional-arrow-bounce 0.5s infinite alternate ease-out;
	}

		height: 44px;
		width: 44px;
	}
	  
	.background {
	  fill: transparent;
	  stroke: rgba(255, 255, 255, 0.4);
	  transition: all 200ms ease;
	}
	  
	.foreground {
	  fill: transparent;
	  stroke-dasharray: 377;
	  stroke-dashoffset: 377;
	  stroke: #fff;
	  transform-origin: 50% 50%;
	  transform: rotate(-90deg);
	  transition: all 800ms ease;
	}
		
	.hero-arrow span:hover .foreground {
	  stroke-dashoffset: 0;
	  transform: rotate(90deg);
	}
	
	@keyframes arrow-bounce {
	  0% { transform: translateY(0); }
	  100% { transform: translateY(0); }
	}
	
	.hero-arrow span:hover:after {

	}

	#project-nav .next-project-image-effects {
		top: -2%;
		-webkit-transform: scale(1.04);
		transform: scale(1.04);
		filter: blur(3px);
	}
	
	.load-project-thumb-with-title .next-project-image {
		z-index:10;
	}
	
	.next-project-image.temporary {
		top:0px!important;
	}
	
	.next-project-image.visible {
		opacity:1!important;
		top:0px!important;
		filter: blur(0px)!important;
		-webkit-transform: scale(1.02) rotate(0) translateY(0)!important;
		transform: scale(1.02) rotate(0) translateY(0)!important;	
	}
	
	.next-project-image-bg {
		position: absolute;
		top: 0;
		left: 0;
		height: 100%;
		width: 100%;
		background-size: cover;
		background-position:center center;
		background-repeat: no-repeat;
		z-index:1;
		-webkit-transform: scale(1);
		transform: scale(1);	
	}
	
	.next-project-image.visible .next-project-image-bg {
		opacity:1!important;
		top: 0!important;	
	}
	
	/* Next Project Caption */
	
	#next-project-caption {
		position:absolute;
		display: flex;
		align-items: center;
		justify-content:center;
		text-align:left;
		left:0;
		right:0;
		margin: 0 auto;
		width: 100%;
		height: 100%;
		box-sizing: border-box;
		padding-top:40px;
		padding-bottom: 40px;
	}
	
	.hero-below-caption #next-project-caption {
		height: auto;
		padding-top:280px;
		padding-bottom: 160px;
	}
	
	.next-caption-wrapper {
		position:relative;
		z-index:10;
		top:0%;
		opacity:1;
		width: 100%;
		height: 100%;
		display: flex;
		align-items: flex-end;
	}
	
	#project-nav .next-ajax-link-project {
		display: block;
		margin: 0;
		width: 100%;
		height: 100%;
		position: absolute;
		z-index: 10;
		top: 0;
		left: 0;
		pointer-events:none;
	}
	
	#project-nav.auto-trigger .next-ajax-link-project {
		pointer-events:none;
	}
	
	#project-nav.active-link .next-ajax-link-project {
		pointer-events:initial;
	}
	
	.disable-ajaxload #project-nav.auto-trigger .next-ajax-link-project {
		pointer-events:initial;
	}
	
	.next-caption {
		position:relative;
		width: 100%;
		height: 100%;
		display: flex;
		align-items: flex-end;
	}
	
	.next-caption .next-hero-title {
		font-size: calc(1rem + 6vw);
  		line-height: calc(1rem + 7vw);
		letter-spacing: -0.2vw;
		flex: 0 1 60%;
  		max-width: 60%;
		text-align:left;
	}
	
	#project-nav .next-hero-title div {
		position:relative;
		display:block;
		overflow:hidden;
		mask-image: linear-gradient(#0003, black 5%, black 95%, #0003 100%);
  		-webkit-mask-image: linear-gradient(#0003, black 5%, black 95%, #0003 100%);
	}
	
	#project-nav .next-hero-title span {
		opacity:1;
	}
	
	#project-nav .next-hero-subtitle {
		display:flex;
		justify-content: flex-end;
	}
	
	#project-nav .next-hero-subtitle span {
		display:block;
		width:auto;
		-webkit-text-fill-color: rgba(0,0,0,0.2);
		-webkit-background-clip: text;
		background-repeat: no-repeat;
		background-image: linear-gradient(currentColor, currentColor);
		background-size: 0% 100%;
	}
	
	.light-content #project-nav .next-hero-subtitle span {
		-webkit-text-fill-color: rgba(255,255,255,0.2);
	}
	
	.temporary-hero .next-hero-title span {
		opacity:1!important;
		-webkit-transform: translateY(0%)!important;
  		transform: translateY(0%)!important;
	}
	
	.next-caption .next-hero-subtitle {
		flex: 0 1 40%;
  		max-width: 40%;
		text-align:right;
	}
	
	/* Next Hero Title and Subtitle Color */
	
	#project-nav .next-hero-title, #project-nav .next-hero-subtitle {
		color:#000;
	}
	
	.light-content #project-nav .next-hero-title, .light-content #project-nav .next-hero-subtitle {
		color:#fff;
	}
	
	/* Next Project Counter */
	
	.next-hero-counter {
		position: absolute;
		height: 20px;
		width:30px;
		text-align:right;
		top:6px;
		right:-45px;
		overflow:hidden;
		opacity:1;		
		color:#000;
	}
	
	.next-hero-counter span {
		position:absolute;
		display:block;
		font-size: 14px;
		font-weight:500;
		line-height:20px;
	}
	
	.change-header .next-hero-counter {
		color: #000;
	}
	
	.light-content .next-hero-counter {
		color: #fff;
	}
	
	.light-content .change-header .next-hero-counter {
		color: #000;
	}
	
	.dark-content .change-header .next-hero-counter {
		color: #fff;
	}
	
	/* Next Project Progress Bar */
	
	.next-hero-progress {
		position: absolute;
		top:0;
		right:0;
		height: 6px;
		width: 100%;
		z-index:100;
		display: flex;
  		justify-content: center;
		display:none;
	}
	
	.next-hero-progress span {
		position: absolute;
		height: 6px;
		width: 0;
		background-color: #000;
	}
	
	.change-header .next-hero-progress span {
		background-color: #000;
	}
	
	.light-content .next-hero-progress span {
		background-color: #fff;
	}
	
	.light-content .change-header .next-hero-progress span {
		background-color: #000;
	}
	
	.dark-content .change-header .next-hero-progress span {
		background-color: #fff;
	}
	
	/* Next Project All Works Button */
	
	.all-works {
		position: absolute;
		top: 20px;
		left: 50%;
    	-webkit-transform: translateX(-50%);
		transform: translateX(-50%);
		width: auto;
		margin: 0 auto;
		margin-top: 25px;
		display: table;
		z-index:100;
	}
	
	.all-works span, .all-works span::before {
		padding:0 5px;
	}
	
	#project-nav.change-header .all-works, #project-nav.change-header .all-works .link-text {
		color:#000;
	}
	
	.light-content #project-nav .all-works, .light-content #project-nav .all-works .link-text {
		color:#fff;
	}
	
	.light-content #project-nav.change-header .all-works, .light-content #project-nav.change-header .all-works .link-text {
		color:#000;
	}
	
	.dark-content #project-nav.change-header .all-works, .dark-content #project-nav.change-header .all-works .link-text {
		color:#fff;
	}
	
	
	
	
	
/*--------------------------------------------------
	Temporary Hero
---------------------------------------------------*/	
	
	.temporary-hero {
		position: fixed;
		top: 0;
		left: 0;
		width: 100%;
		height: 100%;
		z-index: 99999;
		pointer-events: none;
		z-index:10;
	}
	
	.temporary-hero .outer {
		width: 100%;
		padding-top: 40px;
  		padding-bottom: 40px;
		height: 100%;
		position: relative;
		margin: 0 auto;
		box-sizing: border-box;
		z-index:10;
		display: flex;
		align-items: center;
		justify-content:center;
		text-align:center;
	}
	
	.hero-below-caption .temporary-hero .outer {
		height: auto;
		padding-top:280px;
		padding-bottom: 160px;
	}
	
	.temporary-hero .outer.text-align-center {
		justify-content:center;
		text-align:center;
	}
	
	.temporary-hero .outer.text-align-right {
		justify-content:flex-end;
		text-align:right;
	}
	
	.temporary-hero .inner {
		display: block;
		width: 100%;
  		height: 100%;		
	}
	
	.temporary-hero .inner .next-caption {
		position: relative;
		width: 100%;
  		height: 100%;
		display: flex;
		align-items: flex-end;
	}
	
	.temporary-hero .inner .next-caption .next-hero-title {
		font-size: calc(1rem + 6vw);
		line-height: calc(1rem + 7vw);
		letter-spacing: -0.2vw;
	}
	

/*--------------------------------------------------
	General Width and Padding for Hero, Content, Page and Project Nav
---------------------------------------------------*/
	
	.content-max-width {
		box-sizing:border-box;
		padding-left:80px;
		padding-right:80px;
		max-width:1320px;
	}
	
	.content-full-width {
		box-sizing:border-box;
		padding-left:80px;
		padding-right:80px;
		max-width:100%;
	}

	Responsive
---------------------------------------------------*/	
@media only screen and (max-width: 1537px) {
	
	#hero.has-image #hero-caption {
		padding-top:240px;
		padding-bottom: 130px;
	}
	
	.hero-below-caption #next-project-caption {
		padding-top:240px;
		padding-bottom: 130px;
	}
	
	.hero-below-caption .temporary-hero .outer {
		padding-top:240px;
		padding-bottom: 130px;
	}
	
}

	#hero-caption {

	}

	}

		opacity: 0.6;
		left: 0;

		right: 0;

		top: auto;
	}

	}

		right: 0;
		top: auto;
		bottom: -50px;
		opacity:0;
	}
	
	#hero.has-image .hero-subtitle {
		font-size: 20px;
		line-height: 28px;
	}
	
	#project-nav .next-hero-title {
		margin-bottom:48px;
	}
	
	#hero-footer {

	}

		display:none;
	}
	
	#info-text {
		width:60px;
		height:60px;
	}
	
	#info-text::after {
        font: var(--fa-font-solid);
        content: "\f063";
        font-size: 16px;
        width: 100%;
        height: 100%;
        line-height: 60px;
        text-align: right;
        position: absolute;
        left: 0;
        top: 0;
        color: currentColor;
    }
	
	#info-text span {
		display:none;
	}
	
	.hero-column .col-img-wrapper.small-img {
		width: 28%;
	}
	
	.hero-column .col-img-wrapper.large-img {
		width: 38%;
	}
	
	.content-max-width, .content-full-width {
		padding-left:30px;

	}
	
}
