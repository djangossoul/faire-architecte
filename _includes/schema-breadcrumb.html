{% if page.breadcrumbs %}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "BreadcrumbList",
  "itemListElement": [
    {% for crumb in page.breadcrumbs %}
    {
      "@type": "ListItem",
      "position": {{ forloop.index }},
      "name": "{{ crumb.name }}",
      "item": "{{ site.url }}{{ crumb.url }}"
    },
    {% endfor %}
    {
      "@type": "ListItem",
      "position": {{ page.breadcrumbs | size | plus: 1 }},
      "name": "{{ page.title }}",
      "item": "{{ site.url }}{{ page.url }}"
    }
  ]
}
</script>
{% endif %}
